<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
    overflow:hidden;
}

button{
    padding:20px 40px;
    font-size:25px;
    cursor:pointer;
}

#scare{
    display:none;
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
}
</style>
</head>
<body>

<h1>🎂 عندي مفاجأة عيد ميلاد لك</h1>
<button onclick="start()">افتح الهدية 🎁</button>

<img id="scare"
src="https://i.imgur.com/5M0m7wB.jpeg">

<audio id="sound">
<source src="https://www.myinstants.com/media/sounds/scream.mp3" type="audio/mpeg">
</audio>

<script>
function start(){

    document.body.innerHTML =
    "<h1>جاري تحميل الهدية... 🎁</h1>";

    setTimeout(function(){

        document.body.innerHTML =
        '<img id="scare" src="https://i.imgur.com/5M0m7wB.jpeg" style="position:fixed;inset:0;width:100%;height:100%;object-fit:cover;">';

        let audio = new Audio("https://www.myinstants.com/media/sounds/scream.mp3");
        audio.volume = 1;
        audio.play();

        setInterval(()=>{
            document.body.style.transform =
            `translate(${Math.random()*30-15}px,${Math.random()*30-15}px)`;
        },50);

    },4000);
}
</script>

</body>
</html>
